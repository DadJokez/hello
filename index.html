<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DadJokez</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    .joke-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: rgba(108, 99, 255, 0.12);
      border-bottom: 1px solid rgba(108, 99, 255, 0.25);
      backdrop-filter: blur(16px);
      padding: 0.75rem 1.5rem;
      text-align: center;
      font-size: 0.95rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .joke-bar span {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .joke-bar .joke-q {
      color: #d0d0e0;
    }

    .joke-bar .joke-a {
      color: #00d4aa;
      font-weight: 600;
    }

    .joke-bar .fade-out {
      opacity: 0;
      transform: translateY(-6px);
    }

    .joke-bar .fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      top: -200px;
      left: -100px;
      background: #6c63ff;
      animation: float 8s ease-in-out infinite;
    }

    .glow-2 {
      bottom: -200px;
      right: -100px;
      background: #00d4aa;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -30px); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 560px;
      padding: 2.5rem 3rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a8a8ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: #00d4aa;
      font-weight: 500;
      margin-bottom: 2rem;
      letter-spacing: 0.5px;
    }

    /* Joke generator area */
    .joke-display {
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .joke-display .question {
      font-size: 1.2rem;
      color: #d0d0e0;
      line-height: 1.6;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .joke-display .punchline {
      font-size: 1.3rem;
      font-weight: 700;
      color: #00d4aa;
      margin-top: 0.75rem;
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .joke-display .punchline.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .joke-display .placeholder {
      color: #6a6a80;
      font-size: 1.1rem;
      font-style: italic;
    }

    .hit-me {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
      margin-bottom: 2rem;
    }

    .hit-me:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 30px rgba(108, 99, 255, 0.5);
    }

    .hit-me:active {
      transform: translateY(-1px);
    }

    .hit-me:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      padding: 0.5rem 1.2rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #d0d0e0;
      background: rgba(255, 255, 255, 0.04);
    }

    .links a:hover {
      background: rgba(108, 99, 255, 0.15);
      border-color: rgba(108, 99, 255, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="joke-bar">
    <span id="bar-text" class="joke-q fade-in"></span>
  </div>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="card">
    <div class="avatar">DJ</div>
    <h1>DadJokez</h1>
    <p class="tagline">AI-Powered Dad Jokes &bull; Groan Guaranteed</p>

    <div class="joke-display" id="joke-display">
      <p class="placeholder">Press the button. You know you want to.</p>
    </div>

    <button class="hit-me" id="hit-me">Hit Me</button>

    <div class="links">
      <a href="https://github.com/DadJokez" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="#" target="_blank" rel="noopener noreferrer">Twitter</a>
    </div>
  </div>

  <script>
    // --- Cycling joke bar (top) ---
    const barJokes = [
      { q: "Why do programmers prefer dark mode?", a: "Because light attracts bugs!" },
      { q: "What do you call a fake noodle?", a: "An impasta!" },
      { q: "Why don't skeletons fight each other?", a: "They don't have the guts." },
      { q: "What did the ocean say to the beach?", a: "Nothing, it just waved." },
      { q: "Why did the scarecrow win an award?", a: "He was outstanding in his field!" },
      { q: "What do you call cheese that isn't yours?", a: "Nacho cheese!" },
      { q: "Why couldn't the bicycle stand up by itself?", a: "It was two-tired!" },
      { q: "What do you call a bear with no teeth?", a: "A gummy bear!" },
      { q: "Why did the coffee file a police report?", a: "It got mugged!" },
      { q: "What's orange and sounds like a parrot?", a: "A carrot!" },
      { q: "Why don't eggs tell jokes?", a: "They'd crack each other up!" },
      { q: "What did the grape do when it got stepped on?", a: "Nothing, it just let out a little wine." },
      { q: "Why did the math book look so sad?", a: "It had too many problems." },
      { q: "What do you call a dog that does magic?", a: "A Labracadabrador!" },
      { q: "Why did the golfer bring two pairs of pants?", a: "In case he got a hole in one!" },
    ];

    let barIdx = 0;
    const barEl = document.getElementById('bar-text');

    function barFadeOut() {
      barEl.classList.remove('fade-in');
      barEl.classList.add('fade-out');
    }

    function barShowQ() {
      barFadeOut();
      setTimeout(() => {
        barEl.className = 'joke-q fade-in';
        barEl.textContent = barJokes[barIdx].q;
      }, 400);
      setTimeout(barShowA, 3000);
    }

    function barShowA() {
      barFadeOut();
      setTimeout(() => {
        barEl.className = 'joke-a fade-in';
        barEl.textContent = barJokes[barIdx].a;
      }, 400);
      setTimeout(() => {
        barIdx = (barIdx + 1) % barJokes.length;
        barShowQ();
      }, 2500);
    }

    barEl.textContent = barJokes[0].q;
    setTimeout(barShowA, 3000);

    // --- Interactive joke generator ---
    const btn = document.getElementById('hit-me');
    const display = document.getElementById('joke-display');
    let firstJoke = true;

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Thinking...';

      display.innerHTML = '';

      try {
        const res = await fetch('/api/joke');
        if (!res.ok) throw new Error('API error');
        const joke = await res.json();

        // Show question
        const qEl = document.createElement('p');
        qEl.className = 'question';
        qEl.textContent = joke.question;
        display.appendChild(qEl);

        // Show punchline after delay
        const aEl = document.createElement('p');
        aEl.className = 'punchline';
        aEl.textContent = joke.punchline;
        display.appendChild(aEl);

        setTimeout(() => {
          aEl.classList.add('revealed');
        }, 2000);

      } catch (err) {
        display.innerHTML = '<p class="placeholder">Oops, joke machine broke. Try again!</p>';
      }

      btn.disabled = false;
      btn.textContent = firstJoke ? 'Hit Me Again' : 'Another One';
      firstJoke = false;
    });
  </script>
</body>
</html>
