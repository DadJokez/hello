<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DadJokez</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    .joke-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: rgba(108, 99, 255, 0.12);
      border-bottom: 1px solid rgba(108, 99, 255, 0.25);
      backdrop-filter: blur(16px);
      padding: 0.75rem 1.5rem;
      text-align: center;
      font-size: 0.95rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .joke-bar span {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .joke-question {
      color: #d0d0e0;
    }

    .joke-punchline {
      color: #00d4aa;
      font-weight: 600;
    }

    .joke-fade-out {
      opacity: 0;
      transform: translateY(-6px);
    }

    .joke-fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      top: -200px;
      left: -100px;
      background: #6c63ff;
      animation: float 8s ease-in-out infinite;
    }

    .glow-2 {
      bottom: -200px;
      right: -100px;
      background: #00d4aa;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -30px); }
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      padding: 3rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.3);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a8a8ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #00d4aa;
      font-weight: 500;
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #b0b0c0;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      padding: 0.6rem 1.4rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #d0d0e0;
      background: rgba(255, 255, 255, 0.04);
    }

    .links a:hover {
      background: rgba(108, 99, 255, 0.15);
      border-color: rgba(108, 99, 255, 0.4);
      transform: translateY(-2px);
    }

    .links a.primary {
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      border: none;
      color: #fff;
    }

    .links a.primary:hover {
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="joke-bar">
    <span id="joke-text" class="joke-question joke-fade-in"></span>
  </div>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="card">
    <div class="avatar">DJ</div>
    <h1>DadJokez</h1>
    <p class="tagline">Developer &bull; Creator &bull; Joke Enthusiast</p>
    <p class="bio">
      Building things on the internet, one bad pun at a time.
      I write code by day and craft the world's finest dad jokes by night.
      Yes, the jokes are free. No, I will not apologize.
    </p>
    <div class="links">
      <a href="#" class="primary">Get in Touch</a>
      <a href="#">GitHub</a>
      <a href="#">Twitter</a>
    </div>
  </div>
  <script>
    const jokes = [
      { q: "Why do programmers prefer dark mode?", a: "Because light attracts bugs!" },
      { q: "What do you call a fake noodle?", a: "An impasta!" },
      { q: "Why don't skeletons fight each other?", a: "They don't have the guts." },
      { q: "What did the ocean say to the beach?", a: "Nothing, it just waved." },
      { q: "Why did the scarecrow win an award?", a: "He was outstanding in his field!" },
      { q: "What do you call cheese that isn't yours?", a: "Nacho cheese!" },
      { q: "Why couldn't the bicycle stand up by itself?", a: "It was two-tired!" },
      { q: "What do you call a bear with no teeth?", a: "A gummy bear!" },
      { q: "Why did the coffee file a police report?", a: "It got mugged!" },
      { q: "What's orange and sounds like a parrot?", a: "A carrot!" },
      { q: "Why don't eggs tell jokes?", a: "They'd crack each other up!" },
      { q: "What did the grape do when it got stepped on?", a: "Nothing, it just let out a little wine." },
      { q: "Why did the math book look so sad?", a: "It had too many problems." },
      { q: "What do you call a dog that does magic?", a: "A Labracadabrador!" },
      { q: "Why did the golfer bring two pairs of pants?", a: "In case he got a hole in one!" },
    ];

    let current = 0;
    const el = document.getElementById('joke-text');

    function fadeOut() {
      el.classList.remove('joke-fade-in');
      el.classList.add('joke-fade-out');
    }

    function fadeIn() {
      el.classList.remove('joke-fade-out');
      el.classList.add('joke-fade-in');
    }

    function showQuestion() {
      fadeOut();
      setTimeout(() => {
        el.className = 'joke-question joke-fade-in';
        el.textContent = jokes[current].q;
        fadeIn();
      }, 400);

      setTimeout(showPunchline, 3000);
    }

    function showPunchline() {
      fadeOut();
      setTimeout(() => {
        el.className = 'joke-punchline joke-fade-in';
        el.textContent = jokes[current].a;
        fadeIn();
      }, 400);

      setTimeout(() => {
        current = (current + 1) % jokes.length;
        showQuestion();
      }, 2500);
    }

    // Start the cycle
    el.textContent = jokes[0].q;
    setTimeout(showPunchline, 3000);
  </script>
</body>
</html>
