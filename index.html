<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DadJokez</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      top: -200px;
      left: -100px;
      background: #6c63ff;
      animation: float 8s ease-in-out infinite;
    }

    .glow-2 {
      bottom: -200px;
      right: -100px;
      background: #00d4aa;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -30px); }
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      padding: 3rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.3);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a8a8ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #00d4aa;
      font-weight: 500;
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #b0b0c0;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      padding: 0.6rem 1.4rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #d0d0e0;
      background: rgba(255, 255, 255, 0.04);
    }

    .links a:hover {
      background: rgba(108, 99, 255, 0.15);
      border-color: rgba(108, 99, 255, 0.4);
      transform: translateY(-2px);
    }

    .links a.primary {
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      border: none;
      color: #fff;
    }

    .links a.primary:hover {
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="card">
    <div class="avatar">DJ</div>
    <h1>DadJokez</h1>
    <p class="tagline">Developer &bull; Creator &bull; Joke Enthusiast</p>
    <p class="bio">
      Building things on the internet, one bad pun at a time.
      I write code by day and craft the world's finest dad jokes by night.
      Yes, the jokes are free. No, I will not apologize.
    </p>
    <div class="links">
      <a href="#" class="primary">Get in Touch</a>
      <a href="#">GitHub</a>
      <a href="#">Twitter</a>
    </div>
  </div>
</body>
</html>
